[pytest]
# Pytest configuration for Salary Department project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
testpaths = tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

